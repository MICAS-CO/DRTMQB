<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retrieval Question Bank</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing React JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons for Footer -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 selection:bg-blue-200 flex flex-col min-h-screen">
  <div id="root" class="flex-grow flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // --- SVG Icons (replaces lucide-react) ---
    const Clock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const CheckCircle2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const ChevronRight = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const ChevronLeft = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
    const Home = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const RefreshCcw = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>;
    const BookOpen = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const Target = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const Award = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>;
    const Filter = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
    const Loader2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    const DOMAINS = [
      { id: "1", name: "Domain 1: Clinical" },
      { id: "2", name: "Domain 2: Equipment" },
      { id: "3", name: "Domain 3: Environmental" },
      { id: "4", name: "Domain 4: Communication" },
      { id: "5", name: "Domain 5: Operational" },
      { id: "6", name: "Domain 6: Management & Leadership" },
    ];

    function App() {
      const [appState, setAppState] = useState('menu'); // 'menu', 'quiz', 'results'
      const [mode, setMode] = useState('practice'); // 'practice' or 'exam'
      
      const [questionBank, setQuestionBank] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [fetchError, setFetchError] = useState(null);
      
      const [selectedDomains, setSelectedDomains] = useState([]);
      const [examQuestionCount, setExamQuestionCount] = useState(10);
      
      const [activeQuestions, setActiveQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [timeRemaining, setTimeRemaining] = useState(0);
      const [showExplanation, setShowExplanation] = useState(false);

      // Add a cache buster timestamp to ensure GitHub Pages doesn't cache an old version of the JSON
      useEffect(() => {
        fetch('./questions.json?t=' + new Date().getTime())
          .then(response => {
            if (!response.ok) {
              throw new Error('Failed to load questions.json');
            }
            return response.json();
          })
          .then(data => {
            setQuestionBank(data);
            setIsLoading(false);
          })
          .catch(error => {
            console.error("Error fetching questions:", error);
            setFetchError(error.message);
            setIsLoading(false);
          });
      }, []);

      const shuffleArray = (array) => {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      };

      const handleStartQuiz = () => {
        let filtered = questionBank;
        if (selectedDomains.length > 0) {
          filtered = questionBank.filter(q => selectedDomains.includes(q.domain));
        }
        if (filtered.length === 0) {
          alert("No questions found for selected domains. Please select different filters.");
          return;
        }

        filtered = shuffleArray(filtered);

        if (mode === 'exam') {
          const count = Math.min(examQuestionCount, filtered.length);
          filtered = filtered.slice(0, count);
          setTimeRemaining(count * 60);
        }

        setActiveQuestions(filtered);
        setCurrentIndex(0);
        setUserAnswers({});
        setShowExplanation(false);
        setAppState('quiz');
      };

      useEffect(() => {
        let timer;
        if (appState === 'quiz' && mode === 'exam' && timeRemaining > 0) {
          timer = setInterval(() => {
            setTimeRemaining(prev => {
              if (prev <= 1) {
                clearInterval(timer);
                handleSubmitQuiz();
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timer);
      }, [appState, mode, timeRemaining]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s < 10 ? '0' : ''}${s}`;
      };

      const handleSelectAnswer = (optionKey) => {
        if (showExplanation && mode === 'practice') return;
        setUserAnswers(prev => ({
          ...prev,
          [activeQuestions[currentIndex].id]: optionKey
        }));
      };

      const handlePrev = () => {
        if (currentIndex > 0) {
          const prevIndex = currentIndex - 1;
          setCurrentIndex(prevIndex);
          
          const prevQuestion = activeQuestions[prevIndex];
          if (mode === 'practice' && userAnswers[prevQuestion.id]) {
            setShowExplanation(true);
          } else {
            setShowExplanation(false);
          }
        }
      };

      const handleNext = () => {
        if (mode === 'practice' && !showExplanation) {
          setShowExplanation(true);
        } else {
          if (currentIndex < activeQuestions.length - 1) {
            const nextIndex = currentIndex + 1;
            setCurrentIndex(nextIndex);
            
            const nextQuestion = activeQuestions[nextIndex];
            if (mode === 'practice' && userAnswers[nextQuestion.id]) {
              setShowExplanation(true);
            } else {
              setShowExplanation(false);
            }
          } else {
            handleSubmitQuiz();
          }
        }
      };

      const handleSubmitQuiz = () => setAppState('results');

      const resetToMenu = () => {
        setAppState('menu');
        setSelectedDomains([]);
        setUserAnswers({});
        setCurrentIndex(0);
        setShowExplanation(false);
      };

      const renderMenu = () => {
        if (isLoading) {
          return (
            <div className="flex flex-col items-center justify-center flex-grow animate-fade-in py-20">
              <Loader2 className="w-12 h-12 text-blue-500 animate-spin mb-4" />
              <p className="text-slate-600 font-medium text-lg">Loading question bank...</p>
            </div>
          );
        }

        if (fetchError) {
          return (
            <div className="max-w-2xl mx-auto p-6 mt-10 animate-fade-in flex-grow">
              <div className="bg-red-50 border border-red-200 text-red-700 p-8 rounded-2xl flex flex-col items-center text-center shadow-sm">
                <XCircle className="w-12 h-12 mb-4 text-red-500" />
                <h3 className="font-bold text-xl mb-2">Error Loading Questions</h3>
                <p>Could not load the <strong>questions.json</strong> file.</p>
                <p className="text-sm mt-2 opacity-80">{fetchError}</p>
                <p className="text-sm mt-6 text-slate-600">Make sure you have a <code className="bg-slate-200 px-1 py-0.5 rounded">questions.json</code> file in your repository.</p>
              </div>
            </div>
          );
        }

        const maxAvailable = selectedDomains.length === 0 
          ? questionBank.length 
          : questionBank.filter(q => selectedDomains.includes(q.domain)).length;

        return (
          <div className="max-w-2xl mx-auto p-6 animate-fade-in flex-grow">
            <div className="text-center mb-10">
              <h1 className="text-3xl font-bold text-slate-800 mb-2">Retrieval Medicine Question Bank</h1>
              <p className="text-slate-500">Here to help you prep for that exam!</p>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
              <h2 className="text-lg font-semibold flex items-center text-slate-700 mb-4">
                <Target className="w-5 h-5 mr-2 text-blue-500" /> Mode Selection
              </h2>
              <div className="grid grid-cols-2 gap-4">
                <button
                  onClick={() => setMode('practice')}
                  className={`p-4 rounded-xl border-2 transition-all ${
                    mode === 'practice' ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600 hover:border-blue-200'
                  }`}
                >
                  <BookOpen className="w-6 h-6 mx-auto mb-2" />
                  <div className="font-medium">Practice Mode</div>
                  <div className="text-xs opacity-75 mt-1">Instant feedback</div>
                </button>
                <button
                  onClick={() => setMode('exam')}
                  className={`p-4 rounded-xl border-2 transition-all ${
                    mode === 'exam' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-slate-200 text-slate-600 hover:border-indigo-200'
                  }`}
                >
                  <Clock className="w-6 h-6 mx-auto mb-2" />
                  <div className="font-medium">Timed Exam</div>
                  <div className="text-xs opacity-75 mt-1">1 min per question</div>
                </button>
              </div>
            </div>

            {mode === 'exam' && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
                <label className="block text-sm font-medium text-slate-700 mb-2">
                  Number of Questions (Max: {maxAvailable})
                </label>
                <input 
                  type="range" 
                  min="1" 
                  max={maxAvailable || 1} 
                  value={Math.min(examQuestionCount, maxAvailable)}
                  onChange={(e) => setExamQuestionCount(parseInt(e.target.value))}
                  className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                />
                <div className="text-center mt-2 font-bold text-indigo-600">
                  {Math.min(examQuestionCount, maxAvailable)} Questions ({Math.min(examQuestionCount, maxAvailable)} Minutes)
                </div>
              </div>
            )}

            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-8">
              <h2 className="text-lg font-semibold flex items-center text-slate-700 mb-4">
                <Filter className="w-5 h-5 mr-2 text-slate-500" /> Domain Filters
              </h2>
              <div className="space-y-3">
                {DOMAINS.map(domain => (
                  <label key={domain.id} className="flex items-center space-x-3 cursor-pointer group">
                    <input
                      type="checkbox"
                      checked={selectedDomains.includes(domain.id)}
                      onChange={(e) => {
                        if (e.target.checked) setSelectedDomains([...selectedDomains, domain.id]);
                        else setSelectedDomains(selectedDomains.filter(id => id !== domain.id));
                      }}
                      className="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-colors"
                    />
                    <span className="text-slate-700 group-hover:text-slate-900 transition-colors">
                      {domain.name}
                    </span>
                  </label>
                ))}
              </div>
              <div className="mt-4 text-sm text-slate-500">
                {selectedDomains.length === 0 ? "All domains selected by default." : `${selectedDomains.length} domains selected.`}
              </div>
            </div>

            <button
              onClick={handleStartQuiz}
              disabled={maxAvailable === 0}
              className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-bold text-lg shadow-lg transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Begin {mode === 'exam' ? 'Exam' : 'Practice'}
            </button>
          </div>
        );
      };

      const renderQuiz = () => {
        const question = activeQuestions[currentIndex];
        const isAnswered = !!userAnswers[question.id];
        const isLastQuestion = currentIndex === activeQuestions.length - 1;
        
        let buttonText = "Next Question";
        if (mode === 'practice' && !showExplanation) buttonText = "Reveal Answer";
        if (isLastQuestion && (mode === 'exam' || showExplanation)) buttonText = "Finish & View Results";

        let nextDisabled = false;
        if (mode === 'practice' && !showExplanation && !isAnswered) nextDisabled = true;
        if (mode === 'exam' && !isAnswered) nextDisabled = true;

        return (
          <div className="max-w-3xl mx-auto p-4 sm:p-6 pt-20 sm:pt-20 flex-grow flex flex-col w-full">
            <div className="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
              <div className="flex flex-col">
                <span className="text-xs font-bold uppercase tracking-wider text-slate-400">Progress</span>
                <span className="font-semibold text-slate-700">Question {currentIndex + 1} / {activeQuestions.length}</span>
              </div>
              {mode === 'exam' && (
                <div className={`flex items-center font-mono text-lg font-bold ${timeRemaining < 60 ? 'text-red-500 animate-pulse' : 'text-indigo-600'}`}>
                  <Clock className="w-5 h-5 mr-2" />
                  {formatTime(timeRemaining)}
                </div>
              )}
              {mode === 'practice' && (
                <div className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase">
                  Practice
                </div>
              )}
            </div>

            <div className="w-full bg-slate-200 h-1.5 rounded-full mb-8">
              <div className="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / activeQuestions.length) * 100}%` }}></div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 flex-grow mb-6">
              <div className="flex flex-wrap gap-2 mb-4">
                <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-xs font-semibold rounded-md">Domain {question.domain}</span>
                <span className="px-2.5 py-1 bg-slate-100 text-slate-600 text-xs font-semibold rounded-md">Sub {question.subdomain}</span>
                <span className="px-2.5 py-1 bg-indigo-50 text-indigo-700 text-xs font-semibold rounded-md">{question.conceptualAspect}</span>
              </div>
              
              <h3 className="text-xl font-medium text-slate-900 mb-8 leading-relaxed">
                {question.text}
              </h3>

              <div className="space-y-3">
                {Object.entries(question.options).map(([key, value]) => {
                  const isSelected = userAnswers[question.id] === key;
                  const isCorrect = key === question.correctAnswer;
                  
                  let btnClass = "border-slate-200 hover:border-blue-300 hover:bg-slate-50 text-slate-700";
                  if (isSelected) btnClass = "border-blue-500 bg-blue-50 text-blue-800 ring-1 ring-blue-500";

                  if (showExplanation && mode === 'practice') {
                    if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 text-emerald-800 ring-1 ring-emerald-500";
                    else if (isSelected && !isCorrect) btnClass = "border-red-400 bg-red-50 text-red-800 opacity-70";
                    else btnClass = "border-slate-200 opacity-50";
                  }

                  return (
                    <button
                      key={key}
                      onClick={() => handleSelectAnswer(key)}
                      disabled={showExplanation && mode === 'practice'}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-start ${btnClass}`}
                    >
                      <span className="flex-shrink-0 w-8 h-8 rounded-lg bg-white border border-slate-200 shadow-sm flex items-center justify-center font-bold mr-4 mt-0.5">
                        {key}
                      </span>
                      <span className="leading-relaxed mt-1">{value}</span>
                      {showExplanation && mode === 'practice' && isCorrect && <CheckCircle2 className="w-6 h-6 text-emerald-500 ml-auto flex-shrink-0" />}
                      {showExplanation && mode === 'practice' && isSelected && !isCorrect && <XCircle className="w-6 h-6 text-red-500 ml-auto flex-shrink-0" />}
                    </button>
                  );
                })}
              </div>

              {showExplanation && mode === 'practice' && (
                <div className="mt-8 p-5 bg-slate-50 rounded-xl border border-slate-100 animate-fade-in">
                  <h4 className="font-bold text-slate-800 mb-2 flex items-center">
                    <BookOpen className="w-5 h-5 mr-2 text-blue-500" /> Explanation
                  </h4>
                  <p className="text-slate-600 leading-relaxed text-sm">
                    {question.explanation}
                  </p>
                </div>
              )}
            </div>

            <div className="flex justify-between pb-8 gap-4">
              <button
                onClick={handlePrev}
                disabled={currentIndex === 0}
                className={`flex items-center px-4 sm:px-6 py-4 rounded-xl font-bold transition-all shadow-sm border-2
                  ${currentIndex === 0 ? 'border-slate-200 text-slate-300 cursor-not-allowed bg-transparent shadow-none' : 'border-slate-300 text-slate-700 bg-white hover:bg-slate-50 hover:border-slate-400'}`}
              >
                <ChevronLeft className="w-5 h-5 sm:mr-2" />
                <span className="hidden sm:inline">Previous</span>
              </button>

              <button
                onClick={handleNext}
                disabled={nextDisabled}
                className={`flex flex-1 sm:flex-none justify-center items-center px-6 sm:px-8 py-4 rounded-xl font-bold text-white transition-all shadow-md
                  ${nextDisabled ? 'bg-slate-300 cursor-not-allowed shadow-none' : 'bg-slate-900 hover:bg-slate-800 hover:-translate-y-0.5'}`}
              >
                {buttonText}
                {buttonText !== "Reveal Answer" && <ChevronRight className="w-5 h-5 ml-2" />}
              </button>
            </div>
          </div>
        );
      };

      const renderResults = () => {
        let score = 0;
        activeQuestions.forEach(q => {
          if (userAnswers[q.id] === q.correctAnswer) score++;
        });
        const percentage = Math.round((score / activeQuestions.length) * 100);

        return (
          <div className="max-w-4xl mx-auto p-4 sm:p-6 pt-20 sm:pt-20 pb-20 animate-fade-in flex-grow">
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 text-center mb-8 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 to-indigo-500"></div>
              <Award className={`w-20 h-20 mx-auto mb-4 ${percentage >= 70 ? 'text-emerald-500' : 'text-amber-500'}`} />
              <h2 className="text-3xl font-bold text-slate-800 mb-2">Assessment Complete</h2>
              <p className="text-slate-500 mb-6">You completed {activeQuestions.length} questions in {mode} mode.</p>
              
              <div className="inline-flex flex-col items-center justify-center p-6 bg-slate-50 rounded-full w-48 h-48 border-4 border-slate-100">
                <span className="text-5xl font-black text-slate-800">{percentage}%</span>
                <span className="text-slate-500 font-medium mt-1">{score} / {activeQuestions.length}</span>
              </div>
            </div>

            <h3 className="text-xl font-bold text-slate-800 mb-6 pl-2">Detailed Review</h3>
            
            <div className="space-y-6">
              {activeQuestions.map((q, idx) => {
                const userAnswer = userAnswers[q.id];
                const isCorrect = userAnswer === q.correctAnswer;
                const isUnanswered = !userAnswer;

                return (
                  <div key={q.id} className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 overflow-hidden">
                    <div className="flex items-start mb-4">
                      <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white font-bold mr-4 mt-1
                        ${isCorrect ? 'bg-emerald-500' : isUnanswered ? 'bg-slate-300' : 'bg-red-500'}`}>
                        {idx + 1}
                      </div>
                      <div>
                        <div className="flex flex-wrap gap-2 mb-2">
                          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Domain {q.domain}</span>
                          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">• {q.conceptualAspect}</span>
                        </div>
                        <h4 className="text-lg font-medium text-slate-900 leading-snug mb-4">{q.text}</h4>
                      </div>
                    </div>

                    <div className="pl-12 grid gap-3 mb-6">
                      {Object.entries(q.options).map(([key, value]) => {
                        const isSelected = userAnswer === key;
                        const isActualCorrect = q.correctAnswer === key;
                        
                        let bgClass = "bg-slate-50 text-slate-600";
                        if (isActualCorrect) bgClass = "bg-emerald-50 border border-emerald-200 text-emerald-800 font-medium";
                        else if (isSelected && !isActualCorrect) bgClass = "bg-red-50 border border-red-200 text-red-800";

                        return (
                          <div key={key} className={`p-3 rounded-lg flex items-center ${bgClass}`}>
                            <span className="w-6 font-bold opacity-70">{key}.</span>
                            <span className="flex-grow">{value}</span>
                            {isActualCorrect && <CheckCircle2 className="w-5 h-5 text-emerald-500 ml-2" />}
                            {isSelected && !isActualCorrect && <XCircle className="w-5 h-5 text-red-500 ml-2" />}
                          </div>
                        );
                      })}
                      {isUnanswered && (
                         <div className="text-amber-600 text-sm font-semibold flex items-center mt-2">
                           <XCircle className="w-4 h-4 mr-1"/> You did not answer this question.
                         </div>
                      )}
                    </div>

                    <div className="pl-12">
                      <div className="p-4 bg-blue-50/50 rounded-xl border border-blue-100 text-sm text-slate-700 leading-relaxed">
                        <strong className="text-blue-800 block mb-1">Explanation:</strong>
                        {q.explanation}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="mt-8 flex justify-center pb-8">
              <button
                onClick={resetToMenu}
                className="flex items-center px-8 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-lg"
              >
                <RefreshCcw className="w-5 h-5 mr-2" />
                Return to Dashboard
              </button>
            </div>
          </div>
        );
      };

      return (
        <div className="flex-grow relative flex flex-col">
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(10px); }
              to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
              animation: fadeIn 0.4s ease-out forwards;
            }
          `}} />
          
          {appState !== 'menu' && (
            <button
              onClick={resetToMenu}
              className="fixed top-4 left-4 sm:top-6 sm:left-6 z-50 flex items-center p-3 bg-white text-slate-700 rounded-full shadow-md border border-slate-200 hover:bg-slate-900 hover:text-white hover:border-slate-900 transition-all group"
              title="Return to Dashboard"
            >
              <Home className="w-5 h-5" />
              <span className="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-[120px] group-hover:ml-2 group-hover:mr-1 transition-all duration-300 ease-in-out font-bold text-sm">
                Dashboard
              </span>
            </button>
          )}

          {appState === 'menu' && renderMenu()}
          {appState === 'quiz' && renderQuiz()}
          {appState === 'results' && renderResults()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
